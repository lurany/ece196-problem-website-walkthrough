<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1080" role="img" aria-label="Triton CourtLive software architecture diagram">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#4da3ff"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ff9f43"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ffd93d"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#b794f6"/>
    </marker>
    <style>
      .bg { fill: #0a0a0a; }
      .title { fill: #f4efff; font: 700 28px Arial, Helvetica, sans-serif; }
      .layer-title { fill: #f4efff; font: 700 18px Arial, Helvetica, sans-serif; }
      .box-title { fill: #f4efff; font: 700 15px Arial, Helvetica, sans-serif; }
      .box-text { fill: #c9b8e8; font: 400 13px Arial, Helvetica, sans-serif; }
      .label { fill: #f4efff; font: 600 12px Arial, Helvetica, sans-serif; }
      .legend-text { fill: #c9b8e8; font: 400 13px Arial, Helvetica, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1400" height="1080"/>

  <text x="700" y="42" text-anchor="middle" class="title">Triton CourtLive - Software Architecture</text>

  <!-- Hardware Layer -->
  <rect x="40" y="70" width="1320" height="210" rx="12" fill="#0f1f14" stroke="#3d8b5f" stroke-width="2"/>
  <rect x="40" y="70" width="1320" height="36" rx="12" fill="#1f5c3a"/>
  <rect x="40" y="94" width="1320" height="12" fill="#1f5c3a"/>
  <text x="60" y="94" class="layer-title">Hardware</text>

  <rect x="80" y="130" width="250" height="120" rx="10" fill="#111" stroke="#3d8b5f" stroke-width="1.5"/>
  <text x="205" y="158" text-anchor="middle" class="box-title">PIR sensor</text>
  <text x="205" y="182" text-anchor="middle" class="box-text">GPIO HIGH / LOW</text>

  <rect x="420" y="130" width="300" height="120" rx="10" fill="#111" stroke="#3d8b5f" stroke-width="1.5"/>
  <text x="570" y="158" text-anchor="middle" class="box-title">ESP32 devboard</text>
  <text x="570" y="182" text-anchor="middle" class="box-text">reads PIR, deep sleeps</text>
  <text x="570" y="202" text-anchor="middle" class="box-text">300s cycle</text>

  <rect x="810" y="130" width="280" height="120" rx="10" fill="#111" stroke="#3d8b5f" stroke-width="1.5"/>
  <text x="950" y="158" text-anchor="middle" class="box-title">UCSD WiFi</text>
  <text x="950" y="182" text-anchor="middle" class="box-text">UCSD-PROTECTED</text>
  <text x="950" y="202" text-anchor="middle" class="box-text">or hotspot</text>

  <line x1="330" y1="190" x2="420" y2="190" stroke="#b794f6" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="375" y="180" text-anchor="middle" class="label" fill="#b794f6">pin 4</text>

  <line x1="720" y1="190" x2="810" y2="190" stroke="#b794f6" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- Hardware to API -->
  <line x1="570" y1="250" x2="570" y2="310" stroke="#4da3ff" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="590" y="285" class="label" fill="#4da3ff">HTTPS POST /api/reading</text>
  <text x="590" y="302" class="label" fill="#4da3ff">X-API-Key header</text>

  <line x1="650" y1="310" x2="650" y2="250" stroke="#ffd93d" stroke-width="2.5" marker-end="url(#arrow-yellow)"/>
  <text x="670" y="285" class="label" fill="#ffd93d">{ sleep_seconds: 300 }</text>

  <!-- Render API Layer -->
  <rect x="40" y="310" width="1320" height="280" rx="12" fill="#15102a" stroke="#7c5cbf" stroke-width="2"/>
  <rect x="40" y="310" width="1320" height="36" rx="12" fill="#3d2a6b"/>
  <rect x="40" y="334" width="1320" height="12" fill="#3d2a6b"/>
  <text x="60" y="334" class="layer-title">Render - Node.js + Express API</text>

  <rect x="70" y="365" width="260" height="95" rx="10" fill="#111" stroke="#7c5cbf" stroke-width="1.5"/>
  <text x="200" y="392" text-anchor="middle" class="box-title">Auth middleware</text>
  <text x="200" y="414" text-anchor="middle" class="box-text">validates API key in</text>
  <text x="200" y="432" text-anchor="middle" class="box-text">x-api-key header, 401 if wrong</text>

  <rect x="360" y="365" width="290" height="95" rx="10" fill="#111" stroke="#7c5cbf" stroke-width="1.5"/>
  <text x="505" y="392" text-anchor="middle" class="box-title">POST /api/reading</text>
  <text x="505" y="414" text-anchor="middle" class="box-text">writes row to readings table</text>
  <text x="505" y="432" text-anchor="middle" class="box-text">upserts court_status table</text>

  <rect x="680" y="365" width="270" height="95" rx="10" fill="#111" stroke="#7c5cbf" stroke-width="1.5"/>
  <text x="815" y="392" text-anchor="middle" class="box-title">Sleep logic</text>
  <text x="815" y="414" text-anchor="middle" class="box-text">300s during active hours</text>
  <text x="815" y="432" text-anchor="middle" class="box-text">or until courts open if closed</text>

  <line x1="330" y1="412" x2="360" y2="412" stroke="#b794f6" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <line x1="650" y1="412" x2="680" y2="412" stroke="#b794f6" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <rect x="70" y="485" width="260" height="85" rx="10" fill="#111" stroke="#7c5cbf" stroke-width="1.5"/>
  <text x="200" y="512" text-anchor="middle" class="box-title">GET /api/courts</text>
  <text x="200" y="534" text-anchor="middle" class="box-text">queries court_status</text>
  <text x="200" y="552" text-anchor="middle" class="box-text">returns occupied if expires_at &gt; now</text>

  <rect x="360" y="485" width="260" height="85" rx="10" fill="#111" stroke="#7c5cbf" stroke-width="1.5"/>
  <text x="490" y="512" text-anchor="middle" class="box-title">GET /ping</text>
  <text x="490" y="534" text-anchor="middle" class="box-text">health check for UptimeRobot</text>
  <text x="490" y="552" text-anchor="middle" class="box-text">does not call DB</text>

  <rect x="640" y="485" width="260" height="85" rx="10" fill="#111" stroke="#7c5cbf" stroke-width="1.5"/>
  <text x="770" y="512" text-anchor="middle" class="box-title">Rate limiter</text>
  <text x="770" y="534" text-anchor="middle" class="box-text">10 req/min per API key</text>

  <!-- API to DB -->
  <line x1="505" y1="590" x2="505" y2="640" stroke="#b794f6" stroke-width="2.5" marker-end="url(#arrow-purple)"/>
  <text x="525" y="622" class="label" fill="#b794f6">@libsql/client</text>

  <!-- Turso Database Layer -->
  <rect x="40" y="640" width="1320" height="170" rx="12" fill="#1a1a0f" stroke="#8b8b3d" stroke-width="2"/>
  <rect x="40" y="640" width="1320" height="36" rx="12" fill="#4a4a22"/>
  <rect x="40" y="664" width="1320" height="12" fill="#4a4a22"/>
  <text x="60" y="664" class="layer-title">Turso - SQLite Database</text>

  <rect x="80" y="695" width="560" height="95" rx="10" fill="#111" stroke="#8b8b3d" stroke-width="1.5"/>
  <text x="360" y="722" text-anchor="middle" class="box-title">court_status table</text>
  <text x="360" y="744" text-anchor="middle" class="box-text">court_id, occupied, updated_at, expires_at (10 min decay)</text>
  <text x="360" y="764" text-anchor="middle" class="box-text">1 row per court = live state</text>

  <rect x="680" y="695" width="620" height="95" rx="10" fill="#111" stroke="#8b8b3d" stroke-width="1.5"/>
  <text x="990" y="722" text-anchor="middle" class="box-title">readings table</text>
  <text x="990" y="744" text-anchor="middle" class="box-text">court_id, occupied, recorded_at</text>
  <text x="990" y="764" text-anchor="middle" class="box-text">logs every ping indefinitely, index on (court_id, recorded_at)</text>

  <!-- Dashboard to API -->
  <line x1="900" y1="640" x2="900" y2="590" stroke="#ff9f43" stroke-width="2.5" marker-end="url(#arrow-orange)"/>
  <text x="920" y="615" class="label" fill="#ff9f43">GET /api/courts, every 5 min</text>

  <!-- Vercel Dashboard Layer -->
  <rect x="40" y="830" width="1320" height="180" rx="12" fill="#0f1528" stroke="#4d7cbf" stroke-width="2"/>
  <rect x="40" y="830" width="1320" height="36" rx="12" fill="#1e3a6b"/>
  <rect x="40" y="854" width="1320" height="12" fill="#1e3a6b"/>
  <text x="60" y="854" class="layer-title">Vercel - React + Vite Dashboard (courtlive.com)</text>

  <rect x="70" y="885" width="360" height="105" rx="10" fill="#111" stroke="#4d7cbf" stroke-width="1.5"/>
  <text x="250" y="912" text-anchor="middle" class="box-title">useCourts hook</text>
  <text x="250" y="934" text-anchor="middle" class="box-text">polls /api/courts every 300s</text>
  <text x="250" y="952" text-anchor="middle" class="box-text">stale if no data &gt;12 min, occupied, empty, offline</text>

  <rect x="460" y="885" width="360" height="105" rx="10" fill="#111" stroke="#4d7cbf" stroke-width="1.5"/>
  <text x="640" y="912" text-anchor="middle" class="box-title">CourtGrid + CourtCard</text>
  <text x="640" y="934" text-anchor="middle" class="box-text">green = occupied, white = empty</text>
  <text x="640" y="952" text-anchor="middle" class="box-text">red = sensor offline</text>

  <rect x="850" y="885" width="360" height="105" rx="10" fill="#111" stroke="#4d7cbf" stroke-width="1.5"/>
  <text x="1030" y="912" text-anchor="middle" class="box-title">StatusBanner</text>
  <text x="1030" y="934" text-anchor="middle" class="box-text">useCourtHours hook</text>
  <text x="1030" y="952" text-anchor="middle" class="box-text">"Courts closed" when applicable</text>

  <line x1="430" y1="937" x2="460" y2="937" stroke="#b794f6" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <line x1="820" y1="937" x2="850" y2="937" stroke="#b794f6" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- Legend -->
  <rect x="40" y="1030" width="1320" height="36" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <line x1="80" y1="1048" x2="120" y2="1048" stroke="#4da3ff" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="130" y="1053" class="legend-text">sensor to server</text>

  <line x1="290" y1="1048" x2="330" y2="1048" stroke="#ff9f43" stroke-width="3" marker-end="url(#arrow-orange)"/>
  <text x="340" y="1053" class="legend-text">server to browser</text>

  <line x1="520" y1="1048" x2="560" y2="1048" stroke="#ffd93d" stroke-width="3" marker-end="url(#arrow-yellow)"/>
  <text x="570" y="1053" class="legend-text">server to sensor response</text>

  <line x1="780" y1="1048" x2="820" y2="1048" stroke="#b794f6" stroke-width="3" marker-end="url(#arrow-purple)"/>
  <text x="830" y="1053" class="legend-text">internal flow</text>
</svg>
