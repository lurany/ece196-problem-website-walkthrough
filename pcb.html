<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECE196 Problem Website Walkthrough</title>
    <link rel="stylesheet" href="styles.css" />

</head>

<body>
    <nav class="navbar">
        <div class="nav-inner">
            <div class="brand">ECE196 Final Project</div>
            <div class="nav-links">
                <div class="dropdown">
                    <button class="dropdown-toggle">Explore Our Page ▾</button>
                    <div class="dropdown-menu">
                        <a href="index.html">Home</a>
                        <a href="index.html">Team</a>
                        <a href="problem.html">Problem</a>
                        <a href="solutions.html">Solutions</a>
                        <a href="milestones.html">Milestones</a>
                        <a href="pcb.html">PCB Design</a>
                        <a
                            href="https://docs.google.com/document/d/1ArvjWSqZyWCstmWgup7Y_7moODSPmMnTNo6WvHs_hKg/edit?tab=t.0">Video</a>
                        <a href="poster.html">Poster</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    
    <main class="container">
        <section class="section" id="pcb-design">
            <h2 class="section-title">PCB Design</h2>

            <div class="pcb-grid">
                <div class="card">
                    <h3>Motion Sensor</h3>
                    <img src="images/motion_sensor_titled.jpg"
                         alt="Motion sensor CAD model"
                         class="pcb-image">
                </div>

                <div class="card">
                    <h3>PCB Layout</h3>
                    <img src="images/PCBBoardV6pic.png"
                         alt="PCB board layout"
                         class="pcb-image">
                </div>

                <div class="card">
                    <h3>PCB Schematic</h3>
                    <img src="images/PCBSchematicV6pic.png"
                         alt="PCB schematic"
                         class="pcb-image">
                </div>
            </div>
        </section>
    </main>

    <script>
        const toggle = document.querySelector('.dropdown-toggle');
        const menu = document.querySelector('.dropdown-menu');

        toggle.addEventListener('click', () => {
            menu.classList.toggle('open');
        });

        // Close menu when a link is clicked
        menu.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => menu.classList.remove('open'));
        });

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.dropdown')) menu.classList.remove('open');
        });
    </script>
</body>

</html>
